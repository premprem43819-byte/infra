<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sri Sawdammal Infra</title>
<link rel="stylesheet" href="domo.css"/>
</head>
<body>

<!-- Save Modal -->
<div id="saveModal">
  <div class="modal-box">
    <h2>💾 Save Receipt</h2>
    <p id="modalText"></p>
    <div class="modal-steps" id="modalSteps"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-primary" id="modalOpenBtn">Open Receipt</button>
      <button class="mbtn mbtn-secondary" id="modalCloseBtn">Cancel</button>
    </div>
  </div>
</div>

<div class="receipt-container">
  <div class="title-box">
    <h1>Sri Sawdammal Infra (Output)</h1>
  </div>

  <table class="info-table">
    <tr>
      <td class="label">From :</td>
      <td><input type="text" id="fromField"></td>
      <td rowspan="4" class="empty-box"></td>
      <td class="label">Place :</td>
      <td><input type="text" value="Kendaigoundanur"></td>
    </tr>
    <tr>
      <td></td><td></td>
      <td></td><td><input type="text" value="Sullerumbu"></td>
    </tr>
    <tr>
      <td class="label">To :</td>
      <td><input type="text" id="toField"></td>
      <td></td><td><input type="text" value="Dindigul"></td>
    </tr>
    <tr>
      <td></td>
      <td id="material-label">MATERIAL INPUT</td>
      <td class="label">Cell No :</td>
      <td>
        <input type="text" value="790469983"><br>
        <input type="text" value="6369477188">
      </td>
    </tr>
  </table>

  <table id="receiptTable">
    <thead>
      <tr>
        <th>NO</th><th>Date</th><th>Material</th>
        <th>Qty</th><th>Price</th><th>Qty Total</th><th>Total</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr>
        <td colspan="4" class="grand-text">Total</td>
        <td id="qtyGrandTotal" class="grand-qty">0</td>
        <td colspan="2" id="grandTotal">₹ 0.00</td>
      </tr>
    </tfoot>
  </table>

  <div class="buttons">
    <button class="btn" id="addRowBtn">➕ Add Row</button>
    <button class="btn" id="shareBtn">📤 Share</button>
    <button class="btn" id="saveBtn">💾 Save</button>
    <button class="btn" id="printBtn">🖨️ Print</button>
  </div>
</div>

<script src="dome.js"></script>
</body>
</html>
